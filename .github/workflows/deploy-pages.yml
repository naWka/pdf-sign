name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'pdf-sign-site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pdf-sign-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pdf-sign-site/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          STATIC_EXPORT: '1'
          # Project Pages are served from /<repo>; must match the repo name.
          PAGES_BASE_PATH: /pdf-sign
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pdf-sign-site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
